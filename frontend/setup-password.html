<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password | NEC Event Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(124, 58, 237, 0.5);
            --secondary-glow: rgba(59, 130, 246, 0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 70% 20%, var(--primary-glow) 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, var(--secondary-glow) 0%, transparent 40%);
            filter: blur(80px);
            opacity: 0.4;
        }

        .setup-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .success-state {
            display: none;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="setup-card" id="main-card">
        <div id="setup-form-container">
            <div class="header">
                <h1>Welcome to NEC!</h1>
                <p>Set a secure password to finalize your club registration.</p>
            </div>

            <form id="setup-form">
                <div class="form-group">
                    <label for="password">Choose Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">Complete Setup</button>
            </form>
        </div>

        <div id="success-state" class="success-state">
            <div class="success-icon">✓</div>
            <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Account Ready!</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Your password has been set and you have been added to the club. You can now login to your dashboard.</p>
            <a href="login.html" class="btn-submit" style="display: block; text-decoration: none;">Proceed to Login</a>
        </div>
    </div>

    <script src="js/setup-password.js"></script>
</body>
</html>
