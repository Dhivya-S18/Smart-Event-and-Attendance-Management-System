<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - Club Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg-dark: #070a13;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 { width: 500px; height: 500px; background: #6366f1; top: -100px; right: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #f43f5e; bottom: -100px; left: -100px; animation-duration: 25s; }
        .blob-3 { width: 300px; height: 300px; background: #10b981; top: 40%; left: 30%; opacity: 0.2; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .form-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }

        .form-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .form-group input, .form-group select, textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: white !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            outline: none;
            background: rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            padding: 1.25rem;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .teammate-row {
            border-left: 4px solid var(--primary);
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s ease;
        }

        .teammate-row:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(5px);
        }
    </style>
</head>
<body class="register-page">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div id="loading" class="loading-overlay">
        <div class="stat-card">
            <h3 style="animation: pulse 1.5s infinite;">⌛</h3>
            <p>Processing Registration...</p>
        </div>
    </div>

    <div class="glass-card">
        <div class="form-header">
            <h1 id="event-title">Event Registration</h1>
            <p id="event-info">Gathering your details for the big day.</p>
        </div>

        <form id="main-registration-form">
            <div class="input-group-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="student-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Register Number</label>
                    <input type="text" id="reg-no" placeholder="21CS101" required>
                </div>
            </div>

            <div class="input-group-grid">
                <div class="form-group">
                    <label>Department</label>
                    <select id="dept" required>
                        <option value="">Select Department</option>
                        <option value="CSE">CSE</option>
                        <option value="IT">IT</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="Mech">Mech</option>
                        <option value="Civil">Civil</option>
                        <option value="AIDS">AIDS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year of Study</label>
                    <select id="year-of-study" required>
                        <option value="">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="input-group-grid">
                <div class="form-group">
                    <label>College Email</label>
                    <input type="email" id="email" placeholder="john@college.edu" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="9876543210" required>
                </div>
            </div>

            <!-- Team Section -->
            <div id="team-section" style="display: none; margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="font-size: 1.1rem; color: var(--primary);">Teammate Details</h3>
                    <button type="button" class="btn btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="addTeammate()">+ Add Member</button>
                </div>
                <div id="teammates-container">
                    <!-- Dynamic Rows -->
                </div>
            </div>

            <div style="margin-top: 3rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Confirm Registration</button>
            </div>
            
            <p id="feedback-msg" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;"></p>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
