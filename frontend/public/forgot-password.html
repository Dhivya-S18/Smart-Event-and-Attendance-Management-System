<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Club Event Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-dark);">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Forgot Password</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
            Enter your email address and we'll send you a simulation reset token.
        </p>
        <form id="forgot-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@college.edu">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Get Reset Token</button>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="login.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
            </div>
            <p id="error-msg" style="color: var(--danger); text-align: center; margin-top: 1rem; display: none;"></p>
            <p id="success-msg" style="color: #10b981; text-align: center; margin-top: 1rem; display: none;"></p>
        </form>

        <!-- SIMULATION ONLY: Display token for the user to use -->
        <div id="simulation-box" style="display: none; margin-top: 2rem; padding: 1rem; background: rgba(99, 102, 241, 0.1); border: 1px dashed var(--primary); border-radius: 8px;">
            <p style="font-size: 0.8rem; color: var(--primary); margin-bottom: 0.5rem;">SIMULATION TOKEN:</p>
            <code id="token-display" style="word-break: break-all; font-size: 0.75rem; color: white;"></code>
            <button class="btn" style="width: 100%; margin-top: 1rem; padding: 0.5rem;" id="proceed-btn">Reset My Password</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const simBox = document.getElementById('simulation-box');

            try {
                const res = await fetch('https://smart-event-and-attendance-management.onrender.com/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = "Token generated! In a real app, this would be sent to your email.";
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    
                    document.getElementById('token-display').textContent = data.resetToken;
                    simBox.style.display = 'block';
                    
                    document.getElementById('proceed-btn').onclick = () => {
                        window.location.href = `reset-password.html?token=${data.resetToken}`;
                    };
                } else {
                    errorMsg.textContent = data.message || "Failed to process request";
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            } catch (err) {
                errorMsg.textContent = "Connection error";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
